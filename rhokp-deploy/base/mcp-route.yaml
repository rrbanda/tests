apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rhokp-mcp
  labels:
    app.kubernetes.io/name: rhokp-mcp
    app.kubernetes.io/component: mcp-server
spec:
  to:
    kind: Service
    name: rhokp-mcp
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
