apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhokp-mcp
  labels:
    app.kubernetes.io/name: rhokp-mcp
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rhokp-mcp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: rhokp-mcp
        app.kubernetes.io/name: rhokp-mcp
        app.kubernetes.io/component: mcp-server
    spec:
      serviceAccountName: rhokp-sa
      containers:
        - name: okp-mcp
          image: quay.io/redhat-user-workloads/rhel-lightspeed-tenant/okp-mcp:latest
          env:
            - name: MCP_TRANSPORT
              value: streamable-http
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8000"
            - name: MCP_LOG_LEVEL
              value: INFO
            - name: SOLR_URL
              value: http://rhokp-solr:8983
            - name: MCP_SOLR_URL
              value: http://rhokp-solr:8983
          ports:
            - containerPort: 8000
              protocol: TCP
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
