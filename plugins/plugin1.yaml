# Example dynamic plugin override config.
# Copy to dynamic-plugins.override.yaml to activate local plugins.

includes:
  - dynamic-plugins.default.yaml



# # Below you can add custom dynamic plugins, including local ones.

# # EXAMPLES:
plugins: 
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-mcp-chat:pr_1595__0.1.1!backstage-community-plugin-mcp-chat
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          backstage-community.plugin-mcp-chat:
            appIcons:
              - name: mcpChatIcon
                importName: MCPChatIcon
            dynamicRoutes:
              - path: /mcp-chat
                importName: McpChatPage
                menuItem:
                  icon: mcpChatIcon
                  text: MCP Chat

  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-mcp-chat-backend:pr_1595__0.4.0!backstage-community-plugin-mcp-chat-backend
    disabled: false
